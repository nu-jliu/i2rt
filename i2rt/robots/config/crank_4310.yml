# Last-joint mounting geometry (set on the deepest arm link at runtime)
# Per-arm transforms account for different wrist geometries.
last_joint_mount:
  yam:
    pos: "0.0 -0.0398 0.0412"
    quat: "-9.381869e-07 -4.890237e-06 -0.7071064 0.7071072"
    axis: "0 0 1"
  yam_pro:
    pos: "0.0 -0.0398 0.0412"
    quat: "-9.381869e-07 -4.890237e-06 -0.7071064 0.7071072"
    axis: "0 0 1"
  yam_ultra:
    pos: "0.0 -0.0398 0.0412"
    quat: "-9.381869e-07 -4.890237e-06 -0.7071064 0.7071072"
    axis: "0 0 1"
  big_yam:
    pos: "0.0334519 0 -0.0412"
    quat: "0.5 0.5 0.5 0.5"
    axis: "0 0 1"

# Gripper motor config
motor_type: "DM4310"
motor_kp: 20.0
motor_kd: 0.5

# Gripper limits
gripper_limits: [0.0, -2.7]
needs_calibration: false

# Force limiter config
limiter:
  clog_force_threshold: 0.5
  clog_speed_threshold: 0.2
  sign: 1.0
  force_torque_map: "crank"
  gripper_close_angle: 0.13962634    # 8/180*pi
  gripper_open_angle: 2.96705973     # 170/180*pi
  gripper_stroke: 0.071
  motor_reading_offset: 0.174
